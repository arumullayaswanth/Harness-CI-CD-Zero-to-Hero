# ============================================
# PIPELINE: Episode 6, Topic 1 — Deploy Healthcare Website to EC2
# ============================================
# Stage 1: Build & Push to ECR (CI stage, Harness Cloud)
# Stage 2: Deploy to EC2 (CD Deployment stage, Docker Delegate)
# Stage 3: Approval
# Stage 4: Cleanup
#
# ============================================
# CHANGE THESE VALUES:
# ============================================
#   projectIdentifier: HarnessCICDZerotoHero  ← Your project ID
#   orgIdentifier: default                    ← Your org name
#   connectorRef: account.Github              ← Your GitHub connector
#   repoName: Harness-CI-CD-Zero-to-Hero      ← Your repo name
#   connectorRef: account.aws_account         ← Your AWS OIDC connector
#   serviceRef: healthcare_website            ← Your service ID (create in CD → Services)
#   environmentRef: development               ← Your environment ID (create in CD → Environments)
#   infrastructureDefinitions: ec2_docker     ← Your infra ID (create inside environment)
#
# ============================================
# PREREQUISITES:
# ============================================
#   1. account.Github connector - Episode 1
#   2. account.aws_account OIDC connector - Episode 3
#   3. Secret: aws_access_key_id - Episode 3
#   4. Secret: aws_secret_access_key - Episode 3
#   5. Variable: aws_account_id - Episode 4
#   6. Variable: aws_region - Episode 3
#   7. EC2 with Docker + IAM Admin Role + CD Delegate
#   8. EC2 Security Group: Allow port 5000 inbound
#   9. Service: healthcare_website (create in Harness CD → Services → Custom type)
#  10. Environment: development (create in Harness CD → Environments → Pre-Production)
#  11. Infrastructure: ec2_docker (create inside environment → Custom → delegate selector)
# ============================================
pipeline:
  name: episode6-healthcare-docker-cd
  identifier: episode6_healthcare_docker_cd
  # CHANGE THIS: Your project ID (find in URL after /projects/)
  projectIdentifier: HarnessCICDZerotoHero
  # CHANGE THIS: Your org name
  orgIdentifier: default
  tags: {}
  properties:
    ci:
      codebase:
        # CHANGE THIS: Your GitHub connector
        connectorRef: account.Github
        # CHANGE THIS: Your repo name
        repoName: Harness-CI-CD-Zero-to-Hero
        build: <+input>
  stages:
    # ============================================
    # STAGE 1: Build & Push to ECR (CI stage)
    # ============================================
    - stage:
        name: build-and-push
        identifier: build_and_push
        description: "Build Healthcare website image and push to ECR"
        type: CI
        spec:
          cloneCodebase: true
          platform:
            os: Linux
            arch: Amd64
          runtime:
            type: Cloud
            spec: {}
          execution:
            steps:
              - step:
                  type: Run
                  name: Create ECR Repo
                  identifier: create_ecr
                  spec:
                    shell: Sh
                    image: amazon/aws-cli:latest
                    envVariables:
                      AWS_ACCESS_KEY_ID: <+secrets.getValue("aws_access_key_id")>
                      AWS_SECRET_ACCESS_KEY: <+secrets.getValue("aws_secret_access_key")>
                      AWS_DEFAULT_REGION: <+variable.aws_region>
                    command: |-
                      aws ecr create-repository --repository-name healthcare-website --region <+variable.aws_region> 2>/dev/null || echo "Repository already exists"

              - step:
                  type: BuildAndPushECR
                  name: Build and Push to ECR
                  identifier: build_push_ecr
                  spec:
                    # CHANGE THIS: Your AWS OIDC connector
                    connectorRef: account.aws_account
                    region: <+variable.aws_region>
                    account: <+variable.aws_account_id>
                    imageName: healthcare-website
                    tags:
                      - <+pipeline.sequenceId>
                      - latest
                    dockerfile: "Episode-06/Health care/Dockerfile"
                    context: "Episode-06/Health care"

    # ============================================
    # STAGE 2: Deploy to EC2 (CD Deployment stage)
    # ============================================
    - stage:
        name: deploy-to-ec2
        identifier: deploy_to_ec2
        description: "Deploy Healthcare website on EC2 via Docker"
        type: Deployment
        spec:
          deploymentType: Custom
          service:
            # CHANGE THIS: Your service ID (create in CD → Services)
            serviceRef: healthcare_website
          environment:
            # CHANGE THIS: Your environment ID (create in CD → Environments)
            environmentRef: development
            deployToAll: false
            infrastructureDefinitions:
              # CHANGE THIS: Your infrastructure ID (create inside environment)
              - identifier: ec2_docker
          execution:
            steps:
              - step:
                  type: ShellScript
                  name: Deploy Container
                  identifier: deploy_container
                  spec:
                    shell: Bash
                    source:
                      type: Inline
                      spec:
                        script: |-
                          IMAGE="<+variable.aws_account_id>.dkr.ecr.<+variable.aws_region>.amazonaws.com/healthcare-website:<+pipeline.sequenceId>"

                          aws ecr get-login-password --region <+variable.aws_region> | docker login --username AWS --password-stdin <+variable.aws_account_id>.dkr.ecr.<+variable.aws_region>.amazonaws.com

                          docker stop healthcare-website 2>/dev/null || true
                          docker rm healthcare-website 2>/dev/null || true

                          docker pull $IMAGE

                          docker run -d \
                            --name healthcare-website \
                            -p 5000:5000 \
                            --restart unless-stopped \
                            $IMAGE
                    onDelegate: true
                  timeout: 10m

              - step:
                  type: ShellScript
                  name: Health Check
                  identifier: health_check
                  spec:
                    shell: Bash
                    source:
                      type: Inline
                      spec:
                        script: |-
                          sleep 5
                          HTTP_CODE=$(curl -so /dev/null -w "%{http_code}" http://localhost:5000/health 2>/dev/null || echo "000")
                          if [ "$HTTP_CODE" = "200" ]; then
                            echo "Health check PASSED (HTTP 200)"
                          else
                            echo "Health check FAILED (HTTP $HTTP_CODE)"
                            exit 1
                          fi
                    onDelegate: true
                  timeout: 5m

              - step:
                  type: ShellScript
                  name: Tag as Stable
                  identifier: tag_stable
                  spec:
                    shell: Bash
                    source:
                      type: Inline
                      spec:
                        script: |-
                          MANIFEST=$(aws ecr batch-get-image --repository-name healthcare-website --image-ids imageTag=<+pipeline.sequenceId> --region <+variable.aws_region> --query 'images[0].imageManifest' --output text)
                          aws ecr put-image --repository-name healthcare-website --image-tag stable --image-manifest "$MANIFEST" --region <+variable.aws_region> || true
                    onDelegate: true
                  timeout: 5m

            # ============================================
            # ROLLBACK (auto-triggered on deploy failure)
            # ============================================
            rollbackSteps:
              - step:
                  type: ShellScript
                  name: Stop Failed Deployment
                  identifier: stop_failed
                  spec:
                    shell: Bash
                    source:
                      type: Inline
                      spec:
                        script: |-
                          docker stop healthcare-website 2>/dev/null || true
                          docker rm healthcare-website 2>/dev/null || true
                    onDelegate: true
                  timeout: 5m

              - step:
                  type: ShellScript
                  name: Restore Last Successful Build
                  identifier: restore_last
                  spec:
                    shell: Bash
                    source:
                      type: Inline
                      spec:
                        script: |-
                          ROLLBACK_IMAGE="<+variable.aws_account_id>.dkr.ecr.<+variable.aws_region>.amazonaws.com/healthcare-website:stable"
                          aws ecr get-login-password --region <+variable.aws_region> | docker login --username AWS --password-stdin <+variable.aws_account_id>.dkr.ecr.<+variable.aws_region>.amazonaws.com
                          docker pull $ROLLBACK_IMAGE || true
                    onDelegate: true
                  timeout: 5m

              - step:
                  type: ShellScript
                  name: Start Previous Version
                  identifier: start_previous
                  spec:
                    shell: Bash
                    source:
                      type: Inline
                      spec:
                        script: |-
                          ROLLBACK_IMAGE="<+variable.aws_account_id>.dkr.ecr.<+variable.aws_region>.amazonaws.com/healthcare-website:stable"
                          docker run -d \
                            --name healthcare-website \
                            -p 5000:5000 \
                            --restart unless-stopped \
                            $ROLLBACK_IMAGE || true
                    onDelegate: true
                  timeout: 5m

              - step:
                  type: ShellScript
                  name: Rollback Health Check
                  identifier: rollback_health
                  spec:
                    shell: Bash
                    source:
                      type: Inline
                      spec:
                        script: |-
                          sleep 5
                          HTTP_CODE=$(curl -so /dev/null -w "%{http_code}" http://localhost:5000/health 2>/dev/null || echo "000")
                          if [ "$HTTP_CODE" = "200" ]; then
                            echo "Rollback successful (HTTP 200)"
                          else
                            echo "Rollback failed (HTTP $HTTP_CODE)"
                            exit 1
                          fi
                    onDelegate: true
                  timeout: 5m

    # ============================================
    # STAGE 3: Approval
    # ============================================
    - stage:
        name: approval
        identifier: approval
        description: "Approve cleanup"
        type: Approval
        spec:
          execution:
            steps:
              - step:
                  type: HarnessApproval
                  name: Approve Cleanup
                  identifier: approve_cleanup
                  timeout: 1d
                  spec:
                    approvalMessage: |-
                      Healthcare website deployed on EC2.
                      Access: http://EC2-PUBLIC-IP:5000

                      APPROVE to stop container and delete ECR.
                      REJECT to keep running.
                    includePipelineExecutionHistory: true
                    approvers:
                      minimumCount: 1
                      disallowPipelineExecutor: false
                      userGroups:
                        - _project_all_users

    # ============================================
    # STAGE 4: Cleanup (CD Deployment stage)
    # ============================================
    - stage:
        name: cleanup
        identifier: cleanup
        description: "Stop container and delete ECR"
        type: Deployment
        spec:
          deploymentType: Custom
          service:
            serviceRef: healthcare_website
          environment:
            environmentRef: development
            deployToAll: false
            infrastructureDefinitions:
              - identifier: ec2_docker
          execution:
            steps:
              - step:
                  type: ShellScript
                  name: Delete All
                  identifier: delete_all
                  spec:
                    shell: Bash
                    source:
                      type: Inline
                      spec:
                        script: |-
                          docker stop healthcare-website 2>/dev/null || true
                          docker rm healthcare-website 2>/dev/null || true
                          aws ecr delete-repository --repository-name healthcare-website --force --region <+variable.aws_region> || true
                    onDelegate: true
                  timeout: 5m
            rollbackSteps: []

# ============================================
# PIPELINE: Episode 6, Topic 1 — Deploy Healthcare Website to EC2
# ============================================
# Stage 1: Build & Push to ECR (CI stage, Harness Cloud)
# Stage 2: Deploy to EC2 (CD Deployment stage, SSH into EC2)
#
# ============================================
# CHANGE THESE VALUES:
# ============================================
#   projectIdentifier: HarnessCICDZerotoHero  ← Your project ID
#   orgIdentifier: default                    ← Your org name
#   connectorRef: account.Github              ← Your GitHub connector
#   repoName: Harness-CI-CD-Zero-to-Hero      ← Your repo name
#   connectorRef: account.aws_account         ← Your AWS OIDC connector
#   serviceRef: healthcarewebsite             ← Your service ID
#   environmentRef: development               ← Your environment ID
#   infrastructureDefinitions: ec2docker      ← Your infra ID
#
# ============================================
# PREREQUISITES:
# ============================================
#   1. account.Github connector - Episode 1
#   2. account.aws_account OIDC connector - Episode 3
#   3. Secret: aws_access_key_id - Episode 3
#   4. Secret: aws_secret_access_key - Episode 3
#   5. Variable: aws_account_id - Episode 4
#   6. Variable: aws_region - Episode 3
#   7. EC2 with Docker + AWS CLI + IAM Admin Role
#   8. EC2 Security Group: Allow port 5000 inbound
#   9. Service: healthcarewebsite (CD → Services → Secure Shell)
#  10. Environment: development (CD → Environments → Pre-Production)
#  11. Infrastructure: ec2docker (inside environment → AWS → SSH credential)
# ============================================
pipeline:
  name: episode6-healthcare-docker-cd
  identifier: episode6_healthcare_docker_cd
  # CHANGE THIS: Your project ID
  projectIdentifier: HarnessCICDZerotoHero
  # CHANGE THIS: Your org name
  orgIdentifier: default
  tags: {}
  properties:
    ci:
      codebase:
        # CHANGE THIS: Your GitHub connector
        connectorRef: account.Github
        # CHANGE THIS: Your repo name
        repoName: Harness-CI-CD-Zero-to-Hero
        build: <+input>
  stages:
    # ============================================
    # STAGE 1: Build & Push to ECR (CI stage)
    # ============================================
    - stage:
        name: build-and-push
        identifier: build_and_push
        description: "Build Healthcare website image and push to ECR"
        type: CI
        spec:
          cloneCodebase: true
          platform:
            os: Linux
            arch: Amd64
          runtime:
            type: Cloud
            spec: {}
          execution:
            steps:
              - step:
                  type: Run
                  name: Create ECR Repo
                  identifier: create_ecr
                  spec:
                    shell: Sh
                    image: amazon/aws-cli:latest
                    envVariables:
                      AWS_ACCESS_KEY_ID: <+secrets.getValue("aws_access_key_id")>
                      AWS_SECRET_ACCESS_KEY: <+secrets.getValue("aws_secret_access_key")>
                      AWS_DEFAULT_REGION: <+variable.aws_region>
                    command: aws ecr create-repository --repository-name healthcare-website --region <+variable.aws_region> 2>/dev/null || echo "Repository already exists"

              - step:
                  type: BuildAndPushECR
                  name: Build and Push to ECR
                  identifier: build_push_ecr
                  spec:
                    # CHANGE THIS: Your AWS OIDC connector (Account Settings → Connectors) → account.aws_account
                    connectorRef: account.aws_account
                    region: <+variable.aws_region>
                    account: <+variable.aws_account_id>
                    imageName: healthcare-website
                    tags:
                      - <+pipeline.sequenceId>
                      - latest
                    dockerfile: "Episode-06/Health care/Dockerfile"
                    context: "Episode-06/Health care"

    # ============================================
    # STAGE 2: Deploy to EC2 (CD Deployment stage)
    # ============================================
    - stage:
        name: deploy-to-ec2
        identifier: deploy_to_ec2
        description: "Deploy Healthcare website on EC2 via SSH"
        type: Deployment
        spec:
          deploymentType: Ssh
          service:
            # CHANGE THIS: Your service ID (create in CD → Services) → healthcarewebsite
            serviceRef: healthcarewebsite
          environment:
            # CHANGE THIS: Your environment ID (create in CD → Environments) → development
            environmentRef: development
            infrastructureDefinitions:
              # CHANGE THIS: Your infrastructure ID (create inside Environment) → ec2docker
              - identifier: ec2docker
          execution:
            steps:
              - step:
                  type: Command
                  name: Deploy Container
                  identifier: deploy_container
                  spec:
                    onDelegate: false
                    shell: Bash
                    commandUnits:
                      - identifier: Deploy
                        name: Deploy
                        type: Script
                        spec:
                          shell: Bash
                          source:
                            type: Inline
                            spec:
                              script: |
                                IMAGE="<+variable.aws_account_id>.dkr.ecr.<+variable.aws_region>.amazonaws.com/healthcare-website:<+pipeline.sequenceId>"

                                aws ecr get-login-password --region <+variable.aws_region> | docker login --username AWS --password-stdin <+variable.aws_account_id>.dkr.ecr.<+variable.aws_region>.amazonaws.com

                                docker stop healthcare-website 2>/dev/null || true
                                docker rm healthcare-website 2>/dev/null || true

                                docker pull $IMAGE

                                docker run -d \
                                  --name healthcare-website \
                                  -p 5000:5000 \
                                  --restart unless-stopped \
                                  $IMAGE
                  timeout: 10m
                  strategy:
                    repeat:
                      items: <+stage.output.hosts>

              - step:
                  type: Command
                  name: Health Check
                  identifier: health_check
                  spec:
                    onDelegate: false
                    shell: Bash
                    commandUnits:
                      - identifier: Health
                        name: Health
                        type: Script
                        spec:
                          shell: Bash
                          source:
                            type: Inline
                            spec:
                              script: |
                                sleep 5
                                HTTP_CODE=$(curl -so /dev/null -w "%{http_code}" http://localhost:5000/health 2>/dev/null || echo "000")
                                if [ "$HTTP_CODE" = "200" ]; then
                                  echo "Health check PASSED (HTTP 200)"
                                else
                                  echo "Health check FAILED (HTTP $HTTP_CODE)"
                                  exit 1
                                fi
                  timeout: 5m
                  strategy:
                    repeat:
                      items: <+stage.output.hosts>

              - step:
                  type: Command
                  name: Tag as Stable
                  identifier: tag_stable
                  spec:
                    onDelegate: false
                    shell: Bash
                    commandUnits:
                      - identifier: TagStable
                        name: TagStable
                        type: Script
                        spec:
                          shell: Bash
                          source:
                            type: Inline
                            spec:
                              script: |
                                MANIFEST=$(aws ecr batch-get-image --repository-name healthcare-website --image-ids imageTag=<+pipeline.sequenceId> --region <+variable.aws_region> --query 'images[0].imageManifest' --output text)
                                aws ecr put-image --repository-name healthcare-website --image-tag stable --image-manifest "$MANIFEST" --region <+variable.aws_region> || true
                  timeout: 5m
                  strategy:
                    repeat:
                      items: <+stage.output.hosts>

            # ============================================
            # ROLLBACK (auto-triggered on deploy failure)
            # ============================================
            rollbackSteps:
              - step:
                  type: Command
                  name: Stop Failed Deployment
                  identifier: stop_failed
                  timeout: 5m
                  spec:
                    onDelegate: false
                    shell: Bash
                    commandUnits:
                      - identifier: Stop
                        name: Stop
                        type: Script
                        spec:
                          shell: Bash
                          source:
                            type: Inline
                            spec:
                              script: |
                                docker stop healthcare-website 2>/dev/null || true
                                docker rm healthcare-website 2>/dev/null || true
                  strategy:
                    repeat:
                      items: <+stage.output.hosts>

              - step:
                  type: Command
                  name: Restore Last Successful Build
                  identifier: restore_last
                  timeout: 5m
                  spec:
                    onDelegate: false
                    shell: Bash
                    commandUnits:
                      - identifier: Restore
                        name: Restore
                        type: Script
                        spec:
                          shell: Bash
                          source:
                            type: Inline
                            spec:
                              script: |
                                ROLLBACK_IMAGE="<+variable.aws_account_id>.dkr.ecr.<+variable.aws_region>.amazonaws.com/healthcare-website:stable"
                                aws ecr get-login-password --region <+variable.aws_region> | docker login --username AWS --password-stdin <+variable.aws_account_id>.dkr.ecr.<+variable.aws_region>.amazonaws.com
                                docker pull $ROLLBACK_IMAGE || true
                  strategy:
                    repeat:
                      items: <+stage.output.hosts>

              - step:
                  type: Command
                  name: Start Previous Version
                  identifier: start_previous
                  timeout: 5m
                  spec:
                    onDelegate: false
                    shell: Bash
                    commandUnits:
                      - identifier: Start
                        name: Start
                        type: Script
                        spec:
                          shell: Bash
                          source:
                            type: Inline
                            spec:
                              script: |
                                ROLLBACK_IMAGE="<+variable.aws_account_id>.dkr.ecr.<+variable.aws_region>.amazonaws.com/healthcare-website:stable"
                                docker run -d \
                                  --name healthcare-website \
                                  -p 5000:5000 \
                                  --restart unless-stopped \
                                  $ROLLBACK_IMAGE || true
                  strategy:
                    repeat:
                      items: <+stage.output.hosts>

              - step:
                  type: Command
                  name: Rollback Health Check
                  identifier: rollback_health
                  timeout: 5m
                  spec:
                    onDelegate: false
                    shell: Bash
                    commandUnits:
                      - identifier: Health
                        name: Health
                        type: Script
                        spec:
                          shell: Bash
                          source:
                            type: Inline
                            spec:
                              script: |
                                sleep 5
                                HTTP_CODE=$(curl -so /dev/null -w "%{http_code}" http://localhost:5000/health 2>/dev/null || echo "000")
                                if [ "$HTTP_CODE" = "200" ]; then
                                  echo "Rollback successful (HTTP 200)"
                                else
                                  echo "Rollback failed (HTTP $HTTP_CODE)"
                                  exit 1
                                fi
                  strategy:
                    repeat:
                      items: <+stage.output.hosts>
        failureStrategies:
          - onFailure:
              errors:
                - AllErrors
              action:
                type: StageRollback

# ============================================
# CONFIGMAP: Non-secret configuration for the app
# Think of it as: Instructions on the fridge
# Changes here do NOT require rebuilding the Docker image
# ============================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: gocart-config
  namespace: gocart
  labels:
    app: gocart
data:
  NODE_ENV: "production"
  APP_NAME: "GoCart E-Commerce"
  APP_VERSION: "1.0.0"
  PORT: "3000"
  LOG_LEVEL: "info"
  NEXT_TELEMETRY_DISABLED: "1"
  NEXT_PUBLIC_CURRENCY_SYMBOL: "$"

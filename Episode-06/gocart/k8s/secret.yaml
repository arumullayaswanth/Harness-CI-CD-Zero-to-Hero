# ============================================
# SECRET: Sensitive data for GoCart + PostgreSQL
# Think of it as: The safe in the bedroom
# ============================================
apiVersion: v1
kind: Secret
metadata:
  name: gocart-secrets
  namespace: gocart
  labels:
    app: gocart
type: Opaque
stringData:
  # PostgreSQL credentials
  POSTGRES_USER: "gocart"
  POSTGRES_PASSWORD: "gocart123"
  POSTGRES_DB: "gocart"
  # App connects to PostgreSQL service inside K8s cluster
  DATABASE_URL: "postgresql://gocart:gocart123@postgres:5432/gocart"
  DIRECT_URL: "postgresql://gocart:gocart123@postgres:5432/gocart"
  SESSION_SECRET: "harness-course-session-secret-2024"
